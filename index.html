<!DOCTYPE html>
<html>
<head>
  <title>Rēzeknes ielu tīrības karte</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://www.paypal.com/sdk/js?client-id=Ac88Ac73001nBi9ELLacJvk0N3hanPsPvwqtF-3xyBdIr7qUPWnWyRi98sINCUBXXpwY8eIQMWL2m1ut&currency=EUR"></script>
  
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  
  <style>
    body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
    #map { height: 100vh; width: 100vw; }
    path.leaflet-interactive { outline: none; cursor: pointer; }

    .control-panel {
      position: absolute; bottom: 20px; left: 20px;
      background: white; padding: 15px; border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4); z-index: 1000;
      width: 300px; max-height: 85vh; display: flex; flex-direction: column;
      box-sizing: border-box;
    }

    @media (max-width: 600px) {
      .control-panel {
        width: 100%; left: 0; bottom: 0; border-radius: 20px 20px 0 0;
        padding: 20px; max-height: 55vh; overflow-y: auto;
      }
      button { padding: 12px !important; font-size: 16px !important; }
      input[type="checkbox"] { transform: scale(1.4); margin-right: 12px; }
    }

    .disabled-feature { color: #888; font-size: 0.9em; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
    #paypal-button-container { margin-top: 10px; max-height: 250px; overflow-y: auto; }
    .admin-reset { font-size: 10px; color: #ccc; background: none; border: none; cursor: pointer; margin-top: 15px; text-align: center; }
    .promo-container { margin-top: 10px; display: flex; gap: 5px; }
    .promo-container input { flex: 1; padding: 8px; font-size: 14px; }
  </style>
</head>
<body>

<div id="map"></div>

<div class="control-panel" id="panel" style="display:none;">
  <strong>Ielu Statuss</strong><br>
  <label style="display: block; padding: 10px 0;">
    <input type="checkbox" id="carsCheck"> Netīrs braucējiem
  </label>
  
  <div id="pedSection" class="disabled-feature">
    <label style="display: block; padding: 10px 0;">
      <input type="checkbox" id="pedCheck" disabled> Netīrs gājējiem
    </label>
    
    <div id="pay-notice">
      <div class="promo-container">
        <input type="text" id="promoInput" placeholder="Slepenais kods?">
        <button onclick="checkPromo()">Go</button>
      </div>
      <p style="margin: 8px 0;">💰 Maksājiet 0.67 EUR gājēju funkcijai.</p>
      <div id="paypal-button-container"></div>
    </div>
  </div>

  <button onclick="applyStatus()" style="margin-top:10px; width: 100%; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Apstiprināt</button>
  <button onclick="relock()" class="admin-reset">Admin: Reset Purchase</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// --- 1. FIREBASE SETUP (Your Specific Keys) ---
const firebaseConfig = {
  apiKey: "AIzaSyA0dMTX1y7CYZBLyd4lgQDkR8nJ7utRvIc",
  authDomain: "rezekne-app.firebaseapp.com",
  databaseURL: "https://rezekne-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rezekne-app",
  storageBucket: "rezekne-app.firebasestorage.app",
  messagingSenderId: "364360316305",
  appId: "1:364360316305:web:d75b3b082c0cb8ef819630"
};

// Initialize Firebase using the compat method
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// --- 2. MAP SETUP ---
const map = L.map('map', { tap: true, zoomControl: false }).setView([56.5100, 27.3400], 14);
L.control.zoom({ position: 'topright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);

let isPedestrianUnlocked = false; 
let streetStates = {};
let streetLayersById = {};
let selectedLayer = null;

if (localStorage.getItem('pedestrian_unlocked') === 'true') {
  setTimeout(unlockPedestrianFeature, 100);
}

function checkPromo() {
  if (document.getElementById("promoInput").value === "BURGER67") {
    alert("Kods pieņemts! Funkcijas atbloķētas.");
    unlockPedestrianFeature();
  } else { alert("Nepareizs kods!"); }
}

paypal.Buttons({
  createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '0.67', currency_code: 'EUR' } }] }),
  onApprove: (data, actions) => actions.order.capture().then(() => { unlockPedestrianFeature(); })
}).render('#paypal-button-container');

function unlockPedestrianFeature() {
  isPedestrianUnlocked = true;
  localStorage.setItem('pedestrian_unlocked', 'true');
  document.getElementById("pedCheck").disabled = false;
  document.getElementById("pay-notice").style.display = "none";
  document.getElementById("pedSection").classList.remove("disabled-feature");
}

function relock() {
  localStorage.removeItem('pedestrian_unlocked');
  location.reload();
}

function getColor(state) {
  if (!state) return "#3388ff";
  if (state.cars && state.ped) return "red";
  if (state.cars) return "yellow";
  if (state.ped) return "purple";
  return "#3388ff";
}

// --- 3. LIVE SYNC WITH FIREBASE ---
database.ref('streets').on('value', (snapshot) => {
  const data = snapshot.val();
  if (data) {
    streetStates = data;
    for (let id in streetLayersById) {
      if (streetStates[id]) {
        streetLayersById[id].setStyle({ color: getColor(streetStates[id]) });
      }
    }
  }
});

// --- 4. LOAD STREETS ---
async function loadStreets() {
  const query = `[out:json][timeout:25];(way["highway"~"trunk|primary|secondary|tertiary|residential|unclassified|living_street"](56.45,27.25,56.55,27.42););out geom;`;
  try {
    const res = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: query });
    const data = await res.json();
    const geojson = {
      type: "FeatureCollection",
      features: data.elements.map(el => ({
        type: "Feature",
        geometry: { type: "LineString", coordinates: el.geometry.map(g => [g.lon, g.lat]) },
        properties: { id: el.id }
      }))
    };

    L.geoJSON(geojson, {
      style: f => ({ color: getColor(streetStates[f.properties.id]), weight: 8, opacity: 0.6, lineJoin: 'round' }),
      onEachFeature: (f, layer) => {
        const id = f.properties.id;
        streetLayersById[id] = layer;
        
        layer.on("mousedown touchstart", () => layer.setStyle({ weight: 12, opacity: 1 }));
        
        layer.on("click", () => {
          selectedLayer = layer;
          const state = streetStates[id] || { cars:false, ped:false };
          document.getElementById("carsCheck").checked = state.cars;
          if (isPedestrianUnlocked) document.getElementById("pedCheck").checked = state.ped;
          document.getElementById("panel").style.display = "block";
          layer.setStyle({ weight: 8, opacity: 0.8 });
        });
      }
    }).addTo(map);
  } catch (e) { console.error(e); }
}

function applyStatus() {
  if (!selectedLayer) return;
  const id = selectedLayer.feature.properties.id;
  const newState = {
    cars: document.getElementById("carsCheck").checked,
    ped: isPedestrianUnlocked ? document.getElementById("pedCheck").checked : (streetStates[id]?.ped || false)
  };
  
  // Save to Firebase
  database.ref('streets/' + id).set(newState);
  document.getElementById("panel").style.display = "none";
}

loadStreets();
</script>
</body>
</html>
